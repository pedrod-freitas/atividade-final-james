<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">FATEC Catálogo</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/categorias/novo}">Nova Categoria</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/usuarios/novo}">Novo usuário</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/produtos/auditoria}">
                        <i class="bi bi-clock-history"></i> Auditoria
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <span class="navbar-text text-white me-3" sec:authorize="isAuthenticated()">
                    Olá, <strong sec:authentication="name">Usuário</strong>
                </span>

                <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                    <button type="submit" class="btn btn-light btn-sm text-primary fw-bold">Sair</button>
                </form>

                <a class="btn btn-light btn-sm" th:href="@{/login}" sec:authorize="!isAuthenticated()">
                    Entrar
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Alerta de sucesso com horário -->
    <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${mensagemSucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Lista de Produtos</h2>
            <a href="/produtos/novo" class="btn btn-success" sec:authorize="hasRole('ADMIN')">Novo Produto</a>
        </div>
        <div class="card-body">

            <form th:action="@{/produtos}" method="get" class="mb-4">
                <div class="row g-2">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" name="nome" class="form-control"
                                   placeholder="Buscar produto por nome..."
                                   th:value="${param.nome}">
                        </div>
                    </div>

                    <div class="col-md-4">
                        <select name="categoriaId" class="form-select">
                            <option value="">Todas as Categorias</option>
                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.idCategoria}"
                                    th:text="${cat.nome}"
                                    th:selected="${#strings.equals(param.categoriaId, #strings.toString(cat.idCategoria))}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" type="submit">Filtrar</button>
                    </div>
                </div>

                <div class="mt-2" th:if="${param.nome != null and param.nome != ''}">
                    <small class="text-muted">Exibindo resultados para: <strong th:text="${param.nome}"></strong></small>
                    <a th:href="@{/produtos}" class="badge bg-secondary text-decoration-none ms-2">Limpar busca</a>
                </div>
            </form>

            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Preço (R$)</th>
                    <th>Estoque</th>
                    <th class="text-center" sec:authorize="hasRole('ADMIN')">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${produtos}"
                    th:classappend="${p.quantidade != null and p.quantidade < 5} ? 'table-warning' : ''">
                    <td th:text="${p.idProduto}"></td>
                    <td th:text="${p.nome}"></td>
                    <td th:text="${p.categoria != null ? p.categoria.nome : 'Sem Categoria'}"></td>
                    <td th:text="${#numbers.formatDecimal(p.valor, 1, 'POINT', 2, 'COMMA')}"
                        th:classappend="${p.valor > 10000} ? 'text-danger fw-bold' : ''">
                    </td>
                    <td>
                        <span th:text="${p.quantidade != null ? p.quantidade : 0}"></span>
                        <span th:if="${p.quantidade != null and p.quantidade < 5}"
                              class="badge bg-warning text-dark ms-1">Estoque baixo</span>
                    </td>
                    <td class="text-center" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/produtos/editar/{id}(id=${p.idProduto})}"
                           class="btn btn-sm btn-warning">Editar</a>

                        <a th:href="@{/produtos/excluir/{id}(id=${p.idProduto})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Tem certeza que deseja remover este produto?')">Excluir</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-info text-center">
                Nenhum produto encontrado para os filtros selecionados.
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

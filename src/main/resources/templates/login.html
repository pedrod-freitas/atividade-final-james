<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Catálogo Fatec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 400px;">
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0">Área Restrita</h4>
        </div>
        <div class="card-body">
            <div th:if="${param.error}" class="alert alert-danger">
                Usuário ou senha inválidos.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                Você saiu do sistema com sucesso.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <input type="text" name="username" class="form-control" placeholder="Ex: admin" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="******" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
        </div>
        <div class="card-footer text-center">
            <small class="text-muted">Página de login personalizada</small>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 400px;">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Novo Usuário</h3>
        </div>
        <div class="card-body">
            <!-- th:object vincula o formulário ao objeto que o Controller enviou -->
            <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <!-- th:field mapeia o input para o atributo 'username' do UsuarioModel -->
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <!-- th:field mapeia o input para o atributo 'password' -->
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Perfil de Acesso</label>
                    <!-- th:field mapeia o select para o atributo 'role' -->
                    <select th:field="*{role}" class="form-select">
                        <option value="ROLE_USER">Usuário Comum</option>
                        <option value="ROLE_ADMIN">Administrador</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success w-100">Cadastrar</button>
                <a th:href="@{/produtos}" class="btn btn-link w-100 mt-2">Voltar</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>

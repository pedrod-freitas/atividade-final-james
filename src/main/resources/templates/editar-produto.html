<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-warning text-dark">
            <h3 class="mb-0">Editar Produto</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/produtos/editar/{id}(id=${produto.idProduto})}" th:object="${produto}" method="post">

                <input type="hidden" th:field="*{idProduto}">

                <div class="mb-3">
                    <label class="form-label">Nome do Produto</label>
                    <input type="text" th:field="*{nome}" class="form-control" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Preço (R$)</label>
                    <input type="number" step="0.01" th:field="*{valor}" class="form-control" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categoria</label>
                    <select th:field="*{categoria}" class="form-select" required>
                        <option th:each="cat : ${categorias}"
                                th:value="${cat.idCategoria}"
                                th:text="${cat.nome}">
                        </option>
                    </select>
                </div>

<!--                <div class="mb-3">-->
<!--                    <label class="form-label">Data de Cadastro</label>-->
<!--                    <input type="datetime-local" th:field="*{dataCadastro}" class="form-control" readonly>-->
<!--                </div>-->

                <div class="d-flex justify-content-between">
                    <a th:href="@{/produtos}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
